# /etc/nginx/sites-available/mclellan.conf

upstream hub_app {
    server 127.0.0.1:3000;
    keepalive 64;
}

# All HTTP → HTTPS
server {
    listen 80;
    server_name dchat.mclellan.scot nchat.mclellan.scot douglas.mclellan.scot nakai.mclellan.scot;
    return 301 https://$host$request_uri;
}

# ── dchat.mclellan.scot ───────────────────────────────────────────────────────
server {
    listen 443 ssl;
    server_name dchat.mclellan.scot;

    ssl_certificate     /etc/letsencrypt/live/dchat.mclellan.scot/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/dchat.mclellan.scot/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    location / {
        proxy_pass         http://hub_app;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        '';
        proxy_buffering    off;
        proxy_cache        off;
        proxy_read_timeout 300s;
    }
}

