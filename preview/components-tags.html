<!DOCTYPE html><html><head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Manrope:wght@600&display=swap" rel="stylesheet">
<style>
  body { margin: 0; padding: 14px 16px; background: #fff; font-family: 'Inter', sans-serif; }
  .section-label { font-size: 9px; color: #bbb; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 8px; }
  .divider { height: 1px; background: #f2f2f2; margin: 4px 0 12px; }
  .row { display: flex; gap: 7px; flex-wrap: wrap; align-items: center; margin-bottom: 6px; }
  /* Hub tags */
  .model-tag { font-size: 11px; padding: 3px 9px; border-radius: 100px; border: 1px solid #d8d8e4; color: #888; font-family: 'Inter', sans-serif; background: #f8f8fc; }
  .search-tag { font-size: 11px; padding: 3px 9px; border-radius: 100px; border: 1px solid #4caf8a; color: #4caf8a; font-family: 'Inter', sans-serif; background: #f0faf6; }
  .cost-tag { font-size: 11px; padding: 3px 9px; border-radius: 100px; border: 1px solid #d8d8e4; color: #aaa; font-family: 'Inter', sans-serif; background: #f8f8fc; }
  .user-badge { font-size: 10px; color: #7c6af5; text-transform: uppercase; letter-spacing: 0.08em; font-weight: 600; font-family: 'Inter', sans-serif; background: #f0eeff; padding: 3px 9px; border-radius: 100px; }
  /* Portfolio chips */
  .chip-primary { background: #e1e0ff; color: #4648d4; font-size: 12px; font-weight: 600; padding: 5px 13px; border-radius: 9999px; font-family: 'Manrope', sans-serif; }
  .chip-outline { color: #464554; font-size: 12px; font-weight: 600; padding: 5px 13px; border-radius: 9999px; border: 1px solid #c7c4d7; font-family: 'Manrope', sans-serif; }
  .chip-amber { background: #ffdcc5; color: #904900; font-size: 12px; font-weight: 600; padding: 5px 13px; border-radius: 9999px; font-family: 'Manrope', sans-serif; }
</style></head><body>

<div class="section-label">Hub — Message Tags</div>
<div class="row">
  <span class="model-tag">claude-sonnet</span>
  <span class="model-tag">deepseek-v3</span>
  <span class="search-tag">search</span>
  <span class="cost-tag">$0.0032</span>
  <span class="user-badge">Douglas</span>
  <span class="user-badge">Nakai</span>
</div>

<div class="divider"></div>

<div class="section-label">Portfolio — Chips &amp; Pills</div>
<div class="row">
  <span class="chip-primary">FCCA CIA CAMS MSc</span>
  <span class="chip-primary">Block</span>
  <span class="chip-primary">Maples Group</span>
</div>
<div class="row">
  <span class="chip-outline">Internal Audit</span>
  <span class="chip-outline">Fintech</span>
  <span class="chip-outline">Risk</span>
  <span class="chip-amber">Tertiary / amber</span>
</div>

</body></html>
