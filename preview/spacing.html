<!DOCTYPE html><html><head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600&display=swap" rel="stylesheet">
<style>
  body { margin: 0; padding: 14px 16px; background: #fcf8ff; font-family: 'Manrope', sans-serif; }
  .grid { display: flex; gap: 6px; align-items: flex-end; flex-wrap: wrap; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 4px; }
  .bar { background: #c0c1ff; border-radius: 4px; width: 28px; }
  .label { font-size: 9px; color: #767586; font-weight: 600; }
  .val { font-size: 9px; color: #4648d4; font-family: monospace; }
  h4 { font-size: 10px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: #767586; margin: 0 0 10px; }
  .radii-row { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 12px; }
  .rbox { background: #e1e0ff; display: flex; flex-direction: column; align-items: center; justify-content: center; width: 52px; height: 36px; }
  .rlabel { font-size: 9px; color: #4648d4; font-weight: 600; margin-top: 4px; }
  .rval { font-size: 9px; color: #767586; font-family: monospace; }
</style></head><body>
<h4>Spacing Scale</h4>
<div class="grid">
  <div class="item"><div class="bar" style="height:4px"></div><div class="label">base</div><div class="val">4px</div></div>
  <div class="item"><div class="bar" style="height:8px"></div><div class="label">xs</div><div class="val">8px</div></div>
  <div class="item"><div class="bar" style="height:16px"></div><div class="label">sm</div><div class="val">16px</div></div>
  <div class="item"><div class="bar" style="height:24px"></div><div class="label">md</div><div class="val">24px</div></div>
  <div class="item"><div class="bar" style="height:48px"></div><div class="label">lg</div><div class="val">48px</div></div>
  <div class="item"><div class="bar" style="height:80px"></div><div class="label">xl</div><div class="val">80px</div></div>
  <div class="item"><div class="bar" style="height:24px;background:#e9e6f3"></div><div class="label">gutter</div><div class="val">24px</div></div>
  <div class="item"><div class="bar" style="height:64px;background:#dbd8e4"></div><div class="label">margin</div><div class="val">64px</div></div>
</div>
<h4 style="margin-top:14px">Corner Radii</h4>
<div class="radii-row">
  <div><div class="rbox" style="border-radius:4px"></div><div class="rlabel">sm</div><div class="rval">4px</div></div>
  <div><div class="rbox" style="border-radius:8px"></div><div class="rlabel">default</div><div class="rval">8px</div></div>
  <div><div class="rbox" style="border-radius:12px"></div><div class="rlabel">md</div><div class="rval">12px</div></div>
  <div><div class="rbox" style="border-radius:16px"></div><div class="rlabel">lg</div><div class="rval">16px</div></div>
  <div><div class="rbox" style="border-radius:9999px"></div><div class="rlabel">full</div><div class="rval">9999px</div></div>
</div>
</body></html>
