<!DOCTYPE html><html><head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Manrope:wght@600&display=swap" rel="stylesheet">
<style>
  body { margin: 0; padding: 14px 16px; background: #fff; font-family: 'Inter', sans-serif; }
  .section-label { font-size: 9px; color: #bbb; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 8px; }
  .row { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; margin-bottom: 14px; }
  .divider { height: 1px; background: #f2f2f2; margin: 4px 0 14px; }
  /* Hub buttons */
  .btn-primary-hub { background: #7c6af5; color: #fff; border: none; padding: 9px 20px; border-radius: 8px; font-weight: 600; font-size: 13px; cursor: pointer; font-family: 'Inter', sans-serif; }
  .btn-new-hub { padding: 7px 14px; background: #7c6af5; color: #fff; border-radius: 7px; font-size: 12px; font-weight: 600; border: none; cursor: pointer; font-family: 'Inter', sans-serif; }
  .btn-ghost-hub { background: #f5f5f8; border: 1px solid #e0e0e8; color: #555; padding: 6px 12px; border-radius: 6px; font-size: 12px; cursor: pointer; font-family: 'Inter', sans-serif; }
  .btn-export { font-size: 11px; padding: 4px 9px; border-radius: 5px; background: #f5f5f8; border: 1px solid #e0e0e8; color: #666; cursor: pointer; font-family: 'Inter', sans-serif; }
  /* Portfolio buttons */
  .pf-primary { background: #4648d4; color: #fff; border: none; padding: 11px 20px; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; font-family: 'Manrope', sans-serif; }
  .pf-ghost { background: none; border: 1px solid #c7c4d7; color: #1b1b23; padding: 10px 18px; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; font-family: 'Manrope', sans-serif; }
  .pf-chip { background: #e1e0ff; color: #4648d4; font-size: 11px; font-weight: 600; padding: 5px 12px; border-radius: 9999px; font-family: 'Manrope', sans-serif; }
</style></head><body>

<div class="section-label">Hub — Buttons</div>
<div class="row">
  <button class="btn-primary-hub">Send</button>
  <button class="btn-new-hub">+ New chat</button>
  <button class="btn-ghost-hub">Sign out</button>
  <button class="btn-export">Word</button>
  <button class="btn-export">PDF</button>
  <button class="btn-export">Google Doc</button>
</div>

<div class="divider"></div>

<div class="section-label">Portfolio — Buttons &amp; Chips</div>
<div class="row">
  <button class="pf-primary">Download Executive Summary</button>
  <button class="pf-ghost">Portfolio Index</button>
</div>
<div class="row">
  <span class="pf-chip">FCCA CIA CAMS MSc</span>
  <span class="pf-chip">Block</span>
  <span class="pf-chip">Maples Group</span>
</div>

</body></html>
