<!DOCTYPE html><html><head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; }
  body { margin: 0; padding: 16px; background: #ffffff; font-family: 'Inter', sans-serif; display: flex; gap: 16px; align-items: flex-start; }

  /* Sidebar card */
  .sidebar-wrap { flex-shrink: 0; width: 180px; border-radius: 10px; overflow: hidden; border: 1px solid #ececf0; box-shadow: 0 4px 16px rgba(0,0,0,0.08); }
  .sidebar { background: #1a1a1f; }
  .s-header { padding: 11px 12px; border-bottom: 1px solid #2e2e36; }
  .s-logo { font-weight: 700; font-size: 12px; color: #e8e8ec; letter-spacing: -0.01em; }
  .s-badge { font-size: 9px; color: #7c6af5; text-transform: uppercase; letter-spacing: 0.08em; margin-top: 2px; font-weight: 600; }
  .s-section { padding: 7px 12px; }
  .s-label { font-size: 8.5px; color: #555; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 5px; font-weight: 600; }
  .new-btn { display: block; width: 100%; padding: 6px 0; background: #7c6af5; color: #fff; border-radius: 6px; font-size: 10px; font-weight: 600; text-align: center; border: none; cursor: pointer; font-family: 'Inter', sans-serif; }
  .item { padding: 4px 7px; border-radius: 4px; font-size: 10px; color: #666; margin-bottom: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .item.active { color: #e8e8ec; background: #242429; }
  .s-footer { padding: 9px 12px; border-top: 1px solid #2e2e36; }
  .settings-link { font-size: 9px; color: #555; margin-bottom: 5px; display: block; }
  .logout-btn { background: none; border: 1px solid #2e2e36; color: #666; padding: 4px 8px; border-radius: 4px; font-size: 9px; width: 100%; font-family: 'Inter', sans-serif; cursor: pointer; }

  /* Legend */
  .legend { flex: 1; display: flex; flex-direction: column; gap: 9px; padding-top: 2px; }
  .swatch-row { display: flex; align-items: center; gap: 8px; }
  .dot { width: 10px; height: 10px; border-radius: 3px; flex-shrink: 0; }
  .swatch-label { font-size: 10px; color: #888; line-height: 1.3; }
  .swatch-label strong { display: block; color: #333; font-size: 10px; font-weight: 600; }
</style></head><body>

<div class="sidebar-wrap">
  <div class="sidebar">
    <div class="s-header">
      <div class="s-logo">McLellan Hub</div>
      <div class="s-badge">Douglas</div>
    </div>
    <div class="s-section">
      <button class="new-btn">+ New chat</button>
    </div>
    <div class="s-section">
      <div class="s-label">Projects</div>
      <div class="item active">/audit-q3</div>
      <div class="item">/research</div>
      <div class="item">/personal</div>
    </div>
    <div class="s-section">
      <div class="s-label">Recent</div>
      <div class="item">Regulatory review draft</div>
      <div class="item">Block fintech analysis</div>
      <div class="item">Untitled</div>
    </div>
    <div class="s-footer">
      <span class="settings-link">⚙ Model settings</span>
      <button class="logout-btn">Sign out</button>
    </div>
  </div>
</div>

<div class="legend">
  <div class="swatch-row"><div class="dot" style="background:#7c6af5"></div><div class="swatch-label"><strong>Accent #7c6af5</strong>CTA + user badge</div></div>
  <div class="swatch-row"><div class="dot" style="background:#1a1a1f"></div><div class="swatch-label"><strong>Surface #1a1a1f</strong>Sidebar background</div></div>
  <div class="swatch-row"><div class="dot" style="background:#242429;border:1px solid #eee"></div><div class="swatch-label"><strong>Active #242429</strong>Selected item</div></div>
  <div class="swatch-row"><div class="dot" style="background:#2e2e36"></div><div class="swatch-label"><strong>Border #2e2e36</strong>Dividers</div></div>
  <div class="swatch-row"><div class="dot" style="background:#e8e8ec"></div><div class="swatch-label"><strong>Text #e8e8ec</strong>Primary labels</div></div>
</div>

</body></html>
